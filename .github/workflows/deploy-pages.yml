name: Deploy to GitHub Pages

# Builds the static site (authored skin + numeric SMB layouts, no ROM) and
# publishes it to GitHub Pages on every merge/push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deployments: let an in-progress production deploy finish and queue
# newer ones behind it. Cancelling mid-deploy makes the Pages API fail with
# "Deployment failed, try again later", so a burst of pushes must not cancel.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Generates public/game-content (authored sprites + composed manifest +
      # committed numeric levels + synthesized sound), then `vite build`.
      - run: pnpm run build:release
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
